name: Deploy to GitHub Pages

# gh-pages 브랜치에 푸시되면 빌드 후 GitHub Pages로 자동 배포합니다.
# 사전 설정(1회): Settings → Pages → Build and deployment → Source: "GitHub Actions"

on:
  push:
    branches: [main, gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지 (진행 중 실행은 취소하지 않고 큐잉)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # anon key는 브라우저에 공개되는 값(RLS로 보호)이라 빌드에 포함해도 안전합니다.
          # 변경이 잦다면 저장소 Settings → Variables 로 옮겨 ${{ vars.X }} 로 참조하세요.
          VITE_SUPABASE_URL: https://hcmgdztsgjvzcyxyayaj.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjbWdkenRzZ2p2emN5eHlheWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MzU4ODcsImV4cCI6MjA4NzAxMTg4N30.gznaPzY1l8qDAPsEyYNR9KS7f7VqS3xaw-_2HTSwSZw
          VITE_SITE_URL: https://ai-free.dreamitbiz.com

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages가 꺼져 있으면 자동으로 'GitHub Actions' 소스로 활성화
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
